openapi: 3.0.3
info:
  title: Target Analyzer - Robot API
  version: 1.1.0

paths:
  /api/v1/analyze:
    post:
      summary: Analizar URL
      description: Recibe una URL, ejecuta el análisis del sitio objetivo y devuelve identidad, capturas, links, tecnologías y métricas.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
            example:
              url: https://example.com
              options:
                topWordsLimit: 10
                linksLimit: 50
      responses:
        "200":
          description: Análisis realizado correctamente
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
        "400":
          description: Request inválida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missingUrl:
                  value:
                    error: "Invalid request: url is required"
                invalidLimit:
                  value:
                    error: "Invalid request: topWordsLimit must be a positive integer"
        "422":
          description: El sitio objetivo no pudo ser analizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Target could not be analyzed
        "500":
          description: Error interno del Robot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Internal server error
        "504":
          description: Timeout al cargar el sitio objetivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Timeout while loading target page

  /api/v1/health:
    get:
      summary: Health Check
      responses:
        "200":
          description: Servicio disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: UP
        "503":
          description: Servicio no disponible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                error: Service unavailable

components:
  schemas:
    AnalyzeRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: https://example.com
        options:
          type: object
          properties:
            topWordsLimit:
              type: integer
              minimum: 1
              description: Cantidad de palabras frecuentes a devolver. Si supera el máximo configurado, el Robot aplicará el máximo permitido.
              example: 10
            linksLimit:
              type: integer
              minimum: 1
              description: Cantidad máxima de links a devolver. Si supera el máximo configurado, el Robot aplicará el máximo permitido.
              example: 50

    AnalyzeResponse:
      type: object
      required:
        - url
        - identity
        - screenshots
        - links
        - technologies
        - metrics
      properties:
        url:
          type: string
          format: uri
          example: https://example.com
        identity:
          $ref: "#/components/schemas/Identity"
        screenshots:
          type: array
          items:
            type: string
          example:
            - http://localhost:3001/screenshots/example-home.png
        links:
          type: array
          items:
            type: string
          example:
            - https://example.com/contact
            - https://example.com/about
        technologies:
          $ref: "#/components/schemas/Technologies"
        metrics:
          $ref: "#/components/schemas/Metrics"

    Identity:
      type: object
      properties:
        title:
          type: string
          example: Example Site
        description:
          type: string
          example: Example description

    Technologies:
      type: object
      properties:
        server:
          type: string
          example: cloudflare
        language:
          type: string
          example: HTML Estático / Desconocido
        frontendFramework:
          type: string
          example: React
        detected:
          type: array
          items:
            type: string
          example:
            - React
            - Cloudflare
            - Google Analytics

    Metrics:
      type: object
      properties:
        responseTimeMs:
          type: integer
          example: 1200
        documentSizeKb:
          type: number
          format: float
          example: 56.4
        sslValid:
          type: boolean
          example: true
        linkCount:
          type: integer
          example: 25
        imageCount:
          type: integer
          example: 12
        paragraphCount:
          type: integer
          example: 45
        wordCount:
          type: integer
          example: 340
        topWords:
          type: array
          items:
            $ref: "#/components/schemas/TopWord"

    TopWord:
      type: object
      properties:
        word:
          type: string
          example: example
        frequency:
          type: integer
          example: 14

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: UP

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Internal server error
